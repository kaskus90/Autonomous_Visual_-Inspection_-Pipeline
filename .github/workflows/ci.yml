name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r tests/requirements-test.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check api/ inference/

      - name: Mypy type check
        run: mypy api/ --ignore-missing-imports --no-strict-optional

      - name: Run tests
        run: pytest tests/ -v

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: ./inference
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/avip-inference:latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/avip-api:latest
