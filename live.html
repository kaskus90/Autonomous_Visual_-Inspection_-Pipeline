<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Detection Feed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }
        .status {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .status-item {
            background: #2a2a2a;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #ff6b6b;
        }
        .status-item.connected {
            border-left-color: #51cf66;
        }
        .status-item label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 5px;
        }
        .status-item .value {
            font-size: 24px;
            font-weight: bold;
        }
        .feed {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }
        .detection {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-left: 4px solid #4dabf7;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Monaco', 'Courier New', monospace;
        }
        .detection.recent {
            border-left-color: #51cf66;
            background: #1a2e1a;
        }
        .detection-time {
            color: #888;
            font-size: 11px;
            margin-bottom: 5px;
        }
        .detection-data {
            white-space: pre-wrap;
            word-break: break-all;
            color: #aaa;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }
        .connection-error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Live Detection Feed</h1>

        <div class="status">
            <div class="status-item" id="connection-status">
                <label>Connection Status</label>
                <div class="value" id="status-text">Connecting...</div>
            </div>
            <div class="status-item">
                <label>Detections Received</label>
                <div class="value" id="detection-count">0</div>
            </div>
        </div>

        <div id="error-container"></div>

        <div class="feed" id="feed">
            <div class="empty">Waiting for detections...</div>
        </div>
    </div>

    <script>
        let detectionCount = 0;
        const feedElement = document.getElementById('feed');
        const connectionStatus = document.getElementById('connection-status');
        const statusText = document.getElementById('status-text');
        const detectionCountElement = document.getElementById('detection-count');
        const errorContainer = document.getElementById('error-container');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//localhost:8000/ws/live`);

            ws.onopen = () => {
                console.log('WebSocket connected');
                statusText.textContent = 'Connected';
                connectionStatus.classList.add('connected');
                errorContainer.innerHTML = '';
                feedElement.innerHTML = '<div class="empty">Waiting for detections...</div>';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'ping') {
                        return;
                    }

                    // Remove empty state
                    const empty = feedElement.querySelector('.empty');
                    if (empty) {
                        empty.remove();
                    }

                    detectionCount++;
                    detectionCountElement.textContent = detectionCount;

                    // Create detection element
                    const detection = document.createElement('div');
                    detection.className = 'detection recent';

                    const time = new Date().toLocaleTimeString();
                    detection.innerHTML = `
                        <div class="detection-time">${time}</div>
                        <div class="detection-data">${JSON.stringify(data, null, 2)}</div>
                    `;

                    feedElement.insertBefore(detection, feedElement.firstChild);

                    // Keep only last 50 detections
                    while (feedElement.children.length > 50) {
                        feedElement.removeChild(feedElement.lastChild);
                    }

                    // Remove recent highlight after 2 seconds
                    setTimeout(() => {
                        detection.classList.remove('recent');
                    }, 2000);

                } catch (error) {
                    console.error('Error parsing message:', error);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                statusText.textContent = 'Error';
                connectionStatus.classList.remove('connected');
                errorContainer.innerHTML = `<div class="connection-error">⚠️ WebSocket connection error. Make sure the API is running on localhost:8000</div>`;
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                statusText.textContent = 'Disconnected';
                connectionStatus.classList.remove('connected');
                // Attempt to reconnect after 3 seconds
                setTimeout(connect, 3000);
            };
        }

        connect();
    </script>
</body>
</html>
